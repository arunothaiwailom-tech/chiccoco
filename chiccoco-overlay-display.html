<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>chiccoco — Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Kanit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html { background:transparent !important; width:720px; }
body { background:transparent !important; width:720px; overflow:visible; font-family:'Sarabun',sans-serif; margin:0; padding:0; }

.OV-timer {
  width:720px;
  background:linear-gradient(135deg, #8b1a1a, #c0392b);
  border-radius:24px;
  padding:18px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:12px;
  box-shadow:0 4px 16px rgba(139,26,26,.3);
  opacity:0;
  transition:opacity .4s;
}
.OV-timer.visible { opacity:1; }
.OV-timer-label { font-family:'Kanit',sans-serif; font-size:32px; font-weight:700; color:rgba(255,255,255,.9); flex:1; }
.OV-timer-count { font-family:'Kanit',sans-serif; font-size:72px; font-weight:800; color:white; line-height:1; letter-spacing:2px; }
.OV-timer-count.warning { color:#ffd700; }

.OV {
  width:720px;
  background:#f0ece6;
  padding:32px 28px 36px;
  display:inline-flex;
  flex-direction:column;
  gap:16px;
  opacity:0;
  transition:opacity .4s;
  border-radius:32px;
  vertical-align:top;
}
.OV.visible { opacity:1; }

.OV-brand { text-align:center; font-family:'Kanit',sans-serif; font-size:15px; font-weight:400; letter-spacing:10px; color:#5c7a6b; }
.OV-toprow { display:flex; gap:14px; }
.OV-box { background:white; border-radius:20px; padding:18px 22px; text-align:center; flex:1; box-shadow:0 2px 12px rgba(0,0,0,.07); }
.OV-box-lbl { font-size:40px; font-weight:400; color:#aaa8a0; margin-bottom:10px; font-family:'Sarabun',sans-serif; }
.OV-box-code { font-size:82px; font-weight:800; color:#8b1a1a; line-height:1; letter-spacing:1px; font-family:'Kanit',sans-serif; }
.OV-box-sizes { font-size:72px; font-weight:800; color:#8b1a1a; line-height:1.1; font-family:'Kanit',sans-serif; }
.OV-price { background:#d9cfc4; border-radius:20px; text-align:center; padding:18px 22px; box-shadow:0 2px 12px rgba(0,0,0,.07); }
.OV-price-lbl { font-size:40px; font-weight:400; color:#a09488; font-family:'Sarabun',sans-serif; margin-bottom:6px; }
.OV-price-num { font-size:82px; font-weight:800; color:#2c2c2c; line-height:1; font-family:'Kanit',sans-serif; }
.OV-price-sale { display:flex; flex-direction:column; align-items:center; gap:4px; }
.OV-price-original { font-size:40px; font-weight:700; color:#b0a498; text-decoration:line-through; line-height:1; font-family:'Kanit',sans-serif; }
.OV-price-new { font-size:82px; font-weight:800; color:#8b1a1a; line-height:1; font-family:'Kanit',sans-serif; }
.OV-name { font-size:42px; font-weight:700; color:#2c2c2c; text-align:center; line-height:1.4; font-family:'Sarabun',sans-serif; }
.OV-inforow { display:flex; background:white; border-radius:20px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.07); }
.OV-info { flex:1; padding:16px 20px; text-align:center; }
.OV-info+.OV-info { border-left:1.5px solid #ede9e4; }
.OV-info-lbl { font-size:25px; color:#aaa8a0; font-weight:400; font-family:'Sarabun',sans-serif; margin-bottom:8px; }
.OV-info-val { font-size:50px; font-weight:700; color:#2c2c2c; line-height:1.3; font-family:'Sarabun',sans-serif; }
.OV-table { width:100%; border-collapse:separate; border-spacing:0; border-radius:20px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.07); }
.OV-table thead tr { background:#3d4f47; }
.OV-table thead th { color:white; padding:16px 10px; font-size:31px; font-weight:700; text-align:center; font-family:'Sarabun',sans-serif; }
.OV-table tbody tr:nth-child(odd)  { background:white; }
.OV-table tbody tr:nth-child(even) { background:#f5f1eb; }
.OV-table tbody td { padding:14px 10px; text-align:center; font-size:50px; font-weight:600; color:#2c2c2c; font-family:'Sarabun',sans-serif; }
.OV-table tbody td:first-child { font-size:45px; font-weight:800; color:#8b1a1a; font-family:'Kanit',sans-serif; }
</style>
</head>
<body>
<div class="OV-timer" id="OV-timer">
  <div class="OV-timer-label" id="OV-timer-label">Flash Sale!</div>
  <div class="OV-timer-count" id="OV-timer-count">00:00</div>
</div>
<div class="OV" id="OV"></div>

<script>
// ── ดึง shopId จาก URL parameter ──
// ตัวอย่าง URL: chiccoco-overlay-display.html?shop=shop_001
var _shopId = new URLSearchParams(window.location.search).get('shop') || 'default';
var _shopPath = 'chiccoco/shops/' + _shopId;

var _db=null, _state=null, _prod={}, _edits={};

function getP(code) {
  var p=_prod[code]; if(!p) return null;
  var p2=Object.assign({},p);
  var e=_edits[code];
  if(e){
    if(e.name)     p2.name=e.name;
    if(e.color)    p2.color=e.color;
    if(e.material) p2.material=e.material;
    if(e.size)     p2.size=e.size;
    if(e.price)    p2.price=e.price;
    if(e.sizes)    p2.sizes=e.sizes;
  }
  return p2;
}

// ── TIMER ──
var _timerLocal=0, _timerInterval=null, _timerLabel='';

function drawTimer(d) {
  var el=document.getElementById('OV-timer');
  var lbl=document.getElementById('OV-timer-label');
  var cnt=document.getElementById('OV-timer-count');
  if(_timerInterval){ clearInterval(_timerInterval); _timerInterval=null; }
  if(!d||d.seconds<=0){ el.classList.remove('visible'); return; }
  _timerLabel=d.label||'Flash Sale!';
  lbl.textContent=_timerLabel;
  if(!d.running){
    _timerLocal=d.seconds;
    renderTimerCount(cnt,_timerLocal);
    el.classList.add('visible');
    return;
  }
  var elapsed=Math.floor((Date.now()-d.ts)/1000);
  _timerLocal=Math.max(0,d.seconds-elapsed);
  if(_timerLocal<=0){ el.classList.remove('visible'); return; }
  renderTimerCount(cnt,_timerLocal);
  el.classList.add('visible');
  _timerInterval=setInterval(function(){
    _timerLocal--;
    renderTimerCount(cnt,_timerLocal);
    if(_timerLocal<=0){ clearInterval(_timerInterval); _timerInterval=null; el.classList.remove('visible'); }
  },1000);
}

function renderTimerCount(el,sec){
  var m=Math.floor(sec/60),s=sec%60;
  el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  el.className='OV-timer-count'+(sec<=30?' warning':'');
}

var API_KEY    = "AIzaSyBwIlvqugbNYNbFd44DtgKSZWsQrXNnSuI";
var PROJECT_ID = "chiccoco-live";
var DB_URL     = "https://chiccoco-live-default-rtdb.asia-southeast1.firebasedatabase.app";

window.addEventListener('load',function(){
  var s1=document.createElement('script');
  s1.src='https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js';
  s1.onload=function(){
    var s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js';
    s2.onload=function(){ startDB(); };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
});

function startDB(){
  try{
    if(!firebase.apps.length) firebase.initializeApp({apiKey:API_KEY,projectId:PROJECT_ID,databaseURL:DB_URL});
    _db=firebase.database();
    // ดึงข้อมูลเฉพาะ path ของร้านนี้เท่านั้น
    _db.ref(_shopPath+'/products').on('value',function(s){ var d=s.val(); if(d){_prod=d; draw();} });
    _db.ref(_shopPath+'/state').on('value',  function(s){ var d=s.val(); if(d){_state=d; draw();} });
    _db.ref(_shopPath+'/timer').on('value',  function(s){ var d=s.val(); drawTimer(d); });
    _db.ref(_shopPath+'/edits').on('value',  function(s){ _edits=s.val()||{}; draw(); });
  }catch(e){ console.error('Firebase error',e); }
}

function fmt(v){ var n=Number(v); return isNaN(n)?v:n.toLocaleString(); }

function draw(){
  if(!_state||!_state.code) return;
  var p=getP(_state.code);
  if(!p) return;
  var sold=_state.soldSizes||[];
  var sale=_state.salePrice||null;
  var av=(p.sizes||[]).filter(function(s){ return sold.indexOf(s.size)===-1; });
  var lb=av.map(function(s){ return s.size; }).filter(Boolean);
  var co=p.activeCols||[];
  var ph=sale
    ?'<div class="OV-price"><div class="OV-price-lbl">ราคา</div><div class="OV-price-sale"><div class="OV-price-original">'+fmt(p.price)+'</div><div class="OV-price-new">'+fmt(sale)+'</div></div></div>'
    :'<div class="OV-price"><div class="OV-price-lbl">ราคา</div><div class="OV-price-num">'+fmt(p.price)+'</div></div>';
  var h='';
  if(p.type==='misc'){
    var miscSize=p.size||'';
    if(!miscSize&&p.sizes&&p.sizes.length>0){ miscSize=p.sizes.map(function(s){ return s.size; }).filter(Boolean).join(', '); }
    h='<div class="OV-brand">C H I C C O C O</div>'
      +'<div class="OV-toprow">'
      +'<div class="OV-box" style="flex:1.1"><div class="OV-box-lbl">รหัสสินค้า</div><div class="OV-box-code">'+p.code+'</div></div>'
      +ph.replace('class="OV-price"','class="OV-price" style="flex:1"')
      +'</div>'
      +'<div class="OV-name">'+p.name+'</div>'
      +'<div class="OV-inforow">'
      +(p.color?'<div class="OV-info"><div class="OV-info-lbl">สี</div><div class="OV-info-val">'+p.color+'</div></div>':'')
      +(miscSize?'<div class="OV-info"><div class="OV-info-lbl">ขนาดสินค้า</div><div class="OV-info-val" style="font-size:32px">'+miscSize+'</div></div>':'')
      +'</div>'
      +(p.material?'<div class="OV-inforow"><div class="OV-info"><div class="OV-info-lbl">วัสดุ</div><div class="OV-info-val" style="font-size:28px">'+p.material+'</div></div></div>':'');
  }else{
    var rows=av.map(function(s){
      return '<tr><td>'+s.size+'</td>'+co.map(function(c){ return '<td>'+(s[c]||'—')+'</td>'; }).join('')+'</tr>';
    }).join('');
    h='<div class="OV-brand">C H I C C O C O</div>'
      +'<div class="OV-toprow">'
      +'<div class="OV-box" style="flex:1"><div class="OV-box-lbl">รหัสสินค้า</div><div class="OV-box-code">'+p.code+'</div></div>'
      +'<div class="OV-box" style="flex:1"><div class="OV-box-lbl">ไซส์</div><div class="OV-box-sizes">'+(lb.join(', ')||'—')+'</div></div>'
      +'</div>'
      +ph
      +'<div class="OV-name">'+p.name+'</div>'
      +'<div class="OV-inforow">'
      +(p.color?'<div class="OV-info"><div class="OV-info-lbl">สี</div><div class="OV-info-val">'+p.color+'</div></div>':'')
      +(p.material?'<div class="OV-info"><div class="OV-info-lbl">วัสดุ</div><div class="OV-info-val" style="font-size:28px">'+p.material+'</div></div>':'')
      +'</div>'
      +(rows?'<table class="OV-table"><thead><tr><th>ไซส์</th>'+co.map(function(c){ return '<th>'+c+'</th>'; }).join('')+'</tr></thead><tbody>'+rows+'</tbody></table>':'');
  }
  var ov=document.getElementById('OV');
  ov.innerHTML=h;
  ov.className='OV visible';
}
</script>
</body>
</html>
