<style>
* { box-sizing:border-box; margin:0; padding:0; }
html { background:transparent !important; max-width:100%; }
body { background:transparent !important; overflow:hidden; font-family:'Sarabun',sans-serif; margin:0; padding:0; max-width:100%; }

/* ── CSS VARIABLES & THEMES ── */
:root {
  --ov-bg:rgba(255,255,255,0.45);
  --ov-accent:#5c7a6b; --ov-code:#8b1a1a;

  --ov-text:#2c2c2c; --ov-white:rgba(255,255,255,0.6);
  --ov-muted:#aaa8a0; --ov-border:rgba(255,255,255,0.7);
  --ov-row-odd:rgba(255,255,255,0.65); --ov-row-even:rgba(245,241,235,0.65);
  --ov-footer:#ccc; --ov-brand:#5c7a6b;
  --ov-card-shadow:0 32px 64px rgba(0,0,0,.18),0 8px 20px rgba(0,0,0,.10),inset 0 1px 0 rgba(255,255,255,0.8);
  --ov-box-shadow:0 4px 16px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,0.9);
  --ov-blur:blur(20px);
}
body.theme-pink    { --ov-bg:rgba(253,240,245,0.50); --ov-accent:#c0607a; --ov-code:#8b1a3a; --ov-price-bg:linear-gradient(135deg,rgba(247,214,224,0.85),rgba(240,190,208,0.9)); --ov-header:linear-gradient(135deg,#a04060,#8b3a52); --ov-brand:#c0607a; }
body.theme-dark    { --ov-bg:rgba(30,30,46,0.75); --ov-accent:#a78bfa; --ov-code:#f472b6; --ov-price-bg:linear-gradient(135deg,rgba(45,45,66,0.9),rgba(35,35,56,0.95)); --ov-header:linear-gradient(135deg,#2a2a42,#1a1a2e); --ov-text:#e2e8f0; --ov-white:rgba(45,45,66,0.7); --ov-muted:#6b7280; --ov-border:rgba(255,255,255,0.12); --ov-row-odd:rgba(37,37,53,0.8); --ov-row-even:rgba(30,30,46,0.8); --ov-footer:#a78bfa; --ov-brand:#a78bfa; }
body.theme-minimal { --ov-bg:rgba(255,255,255,0.65); --ov-accent:#333; --ov-code:#111; --ov-price-bg:linear-gradient(135deg,rgba(240,240,240,0.9),rgba(230,230,230,0.95)); --ov-header:linear-gradient(135deg,#333,#222); --ov-text:#111; --ov-brand:#333; }
body.theme-gold    { --ov-bg:rgba(253,248,238,0.50); --ov-accent:#b8860b; --ov-code:#8b1a1a; --ov-price-bg:linear-gradient(135deg,rgba(232,213,163,0.85),rgba(216,197,147,0.9)); --ov-header:linear-gradient(135deg,#9a7a00,#7a5c00); --ov-brand:#b8860b; }
body.theme-songkran  { --ov-bg:rgba(224,244,255,0.55); --ov-accent:#0077b6; --ov-code:#023e8a; --ov-price-bg:linear-gradient(135deg,rgba(173,232,244,0.85),rgba(144,224,239,0.9)); --ov-header:linear-gradient(135deg,#0096c7,#0077b6); --ov-brand:#0077b6; }
body.theme-loykratong{ --ov-bg:rgba(26,10,46,0.80); --ov-accent:#f7b731; --ov-code:#f7b731; --ov-price-bg:linear-gradient(135deg,rgba(45,27,94,0.9),rgba(61,31,110,0.95)); --ov-header:linear-gradient(135deg,#4d2080,#3d1f6e); --ov-text:#f8e7ff; --ov-border:rgba(247,183,49,0.3); --ov-brand:#f7b731; }
body.theme-newyearthai{ --ov-bg:rgba(255,248,240,0.55); --ov-accent:#e63946; --ov-code:#c1121f; --ov-price-bg:linear-gradient(135deg,rgba(255,214,214,0.85),rgba(255,190,190,0.9)); --ov-header:linear-gradient(135deg,#d52020,#c1121f); --ov-brand:#e63946; }
body.theme-mothersday{ --ov-bg:rgba(255,240,246,0.55); --ov-accent:#e91e8c; --ov-code:#c2185b; --ov-price-bg:linear-gradient(135deg,rgba(252,228,236,0.85),rgba(248,200,218,0.9)); --ov-header:linear-gradient(135deg,#c0206a,#880e4f); --ov-brand:#e91e8c; }
body.theme-cny       { --ov-bg:rgba(255,243,224,0.55); --ov-accent:#d32f2f; --ov-code:#b71c1c; --ov-price-bg:linear-gradient(135deg,rgba(255,205,210,0.85),rgba(255,180,180,0.9)); --ov-header:linear-gradient(135deg,#e53030,#b71c1c); --ov-brand:#d32f2f; }
body.theme-valentine { --ov-bg:rgba(255,240,243,0.55); --ov-accent:#e91e63; --ov-code:#c2185b; --ov-price-bg:linear-gradient(135deg,rgba(252,228,236,0.85),rgba(248,200,218,0.9)); --ov-header:linear-gradient(135deg,#c0206a,#880e4f); --ov-brand:#e91e63; }

/* ── TIMER ── */
.OV-timer { background:linear-gradient(135deg,#8b1a1a,#c0392b); border-radius:24px; padding:18px 28px; display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:12px; opacity:0; transition:opacity .4s; box-sizing:border-box; box-shadow:0 8px 24px rgba(139,26,26,.4); }
.OV-timer.visible { opacity:1; }
.OV-timer-label { font-family:'Kanit',sans-serif; font-size:32px; font-weight:700; color:rgba(255,255,255,.9); flex:1; }
.OV-timer-count { font-family:'Kanit',sans-serif; font-size:72px; font-weight:800; color:white; line-height:1; }
.OV-timer-count.warning { color:#ffd700; }

/* ── OV BASE — Glassmorphism ── */
.OV {
  display:inline-flex; flex-direction:column;
  background:var(--ov-bg);
  backdrop-filter:var(--ov-blur);
  -webkit-backdrop-filter:var(--ov-blur);
  border:1.5px solid var(--ov-border);
  border-radius:32px; padding:24px 22px; gap:12px;
  opacity:0; transition:opacity .4s;
  vertical-align:top; max-width:100%; box-sizing:border-box;
  box-shadow:var(--ov-card-shadow);
}
.OV.visible { opacity:1; }

/* ── shared components ── */
.OV-brand { text-align:center; font-family:'Kanit',sans-serif; font-size:40px; font-weight:700; letter-spacing:4px; color:var(--ov-brand); text-transform:uppercase; }
.OV-color-group { background:var(--ov-white); backdrop-filter:blur(8px); border:1px solid var(--ov-border); border-radius:18px; padding:14px 16px; box-shadow:var(--ov-box-shadow); }
.OV-color-group-lbl { font-size:22px; color:var(--ov-muted); text-align:center; margin-bottom:10px; }
.OV-color-pills { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
.OV-color-pill { padding:10px 22px; border-radius:30px; font-size:38px; font-weight:700; font-family:'Kanit',sans-serif; background:var(--ov-bg); backdrop-filter:blur(6px); color:var(--ov-text); border:1.5px solid var(--ov-border); white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,.08); }
.OV-color-pill.active { background:var(--ov-price-bg); color:var(--ov-code); border:2.5px solid var(--ov-code); font-size:42px; }
.OV-second { margin-top:20px; background:var(--ov-bg); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1.5px solid var(--ov-border); border-radius:24px; padding:18px 16px; display:flex; flex-direction:column; gap:12px; box-shadow:var(--ov-card-shadow); }
.OV-second-header { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
.OV-second-header-line { flex:1; height:1.5px; background:var(--ov-accent); opacity:.35; }
.OV-second-header-badge { font-family:'Kanit',sans-serif; font-size:20px; font-weight:700; color:var(--ov-accent); letter-spacing:3px; white-space:nowrap; }
.OV-footer { text-align:center; font-family:'Kanit',sans-serif; font-size:18px; color:var(--ov-footer); letter-spacing:4px; }
.OV-toprow { display:flex; gap:12px; width:100%; }

/* กล่อง glass */
.OV-box {
  background:var(--ov-white);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid var(--ov-border);
  border-radius:18px; padding:14px 16px; text-align:center;
  box-shadow:var(--ov-box-shadow);
  flex:1;
}
.OV-prod-img { width:100px; height:100px; border-radius:14px; object-fit:cover; flex-shrink:0; box-shadow:0 4px 16px rgba(0,0,0,.2); }
.OV-box-with-img { display:flex; align-items:center; gap:14px; }
.OV-box-lbl { font-size:34px; font-weight:400; color:var(--ov-muted); margin-bottom:6px; }
.OV-box-code  { font-size:74px; font-weight:800; color:var(--ov-code); line-height:1; font-family:'Kanit',sans-serif; }
.OV-box-sizes { font-size:64px; font-weight:800; color:var(--ov-code); line-height:1.1; font-family:'Kanit',sans-serif; white-space:normal; overflow-wrap:break-word; word-break:break-word; }

/* ราคา glass gradient */
.OV-price {
  background:var(--ov-price-bg);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.5);
  border-radius:18px; text-align:center; padding:14px 16px;
  box-shadow:0 6px 20px rgba(139,90,60,.15), inset 0 1px 0 rgba(255,255,255,.5);
}
.OV-price-lbl { font-size:34px; font-weight:400; color:var(--ov-muted); margin-bottom:4px; }
.OV-price-num { font-size:74px; font-weight:800; color:var(--ov-text); line-height:1; font-family:'Kanit',sans-serif; }
.OV-price-sale { display:flex; flex-direction:column; align-items:center; gap:2px; }
.OV-price-original { font-size:36px; font-weight:700; color:var(--ov-muted); text-decoration:line-through; line-height:1; font-family:'Kanit',sans-serif; }
.OV-price-new { font-size:74px; font-weight:800; color:var(--ov-code); line-height:1; font-family:'Kanit',sans-serif; }
.OV-name { font-size:38px; font-weight:700; color:var(--ov-text); text-align:center; line-height:1.4; font-family:'Sarabun',sans-serif; }

/* inforow glass */
.OV-inforow {
  display:flex;
  background:var(--ov-white);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid var(--ov-border);
  border-radius:18px; overflow:hidden;
  box-shadow:var(--ov-box-shadow);
}
.OV-info { flex:1; padding:12px 14px; text-align:center; }
.OV-info+.OV-info { border-left:1.5px solid rgba(255,255,255,0.4); }
.OV-info-lbl { font-size:22px; color:var(--ov-muted); font-weight:400; margin-bottom:6px; }
.OV-info-val { font-size:44px; font-weight:700; color:var(--ov-text); line-height:1.3; font-family:'Sarabun',sans-serif; white-space:normal; overflow-wrap:break-word; word-break:break-word; }

/* table glass */
.OV-table { width:100%; border-collapse:separate; border-spacing:0; border-radius:18px; overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,.10); table-layout:fixed; border:1px solid rgba(255,255,255,0.4); }
.OV-table thead tr { background:var(--ov-header); }
.OV-table thead th { color:white; padding:12px 6px; font-size:35px; font-weight:700; text-align:center; font-family:'Sarabun',sans-serif; }
.OV-table tbody tr:nth-child(odd)  { background:var(--ov-row-odd); }
.OV-table tbody tr:nth-child(even) { background:var(--ov-row-even); }
.OV-table tbody td { padding:10px 4px; text-align:center; font-size:44px; font-weight:600; color:var(--ov-text); white-space:normal; overflow-wrap:break-word; word-break:break-word; }
.OV-table tbody td:first-child { font-size:40px; font-weight:800; color:var(--ov-code); font-family:'Kanit',sans-serif; white-space:nowrap; }

/* ── IMG LARGE BANNER ── */
.OV-img-banner { width:100%; border-radius:20px; overflow:hidden; margin-bottom:4px; aspect-ratio:1/1; box-shadow:0 8px 24px rgba(0,0,0,.2), inset 0 0 0 1px rgba(255,255,255,.3); }
.OV-img-banner img { width:100%; height:100%; display:block; object-fit:cover; border-radius:20px; filter:brightness(1.03) contrast(1.04) saturate(1.08); }

/* ── HORIZONTAL layout ── */
.OV.horizontal { flex-direction:row; flex-wrap:wrap; align-items:stretch; }
.OV.horizontal .OV-brand { width:100%; letter-spacing:6px; }
.OV.horizontal .OV-footer { width:100%; }
.OV-col-L { display:flex; flex-direction:column; gap:12px; flex:0 0 40%; }
.OV-col-R { display:flex; flex-direction:column; gap:12px; flex:1; }
.OV.horizontal .OV-name { text-align:center; font-size:32px; }
.OV.horizontal .OV-info-val { font-size:44px; overflow-wrap:break-word; word-break:break-word; hyphens:auto; line-height:1.2; }

/* ── SOLD OUT STICKER ── */
.sold-out-overlay { position:fixed; inset:0; z-index:999; display:flex; align-items:center; justify-content:center; pointer-events:none; opacity:0; transition:opacity .4s; }
.sold-out-overlay.visible { opacity:1; }
.sold-out-sticker { background:#cc0000; color:white; font-family:'Kanit',sans-serif; font-size:120px; font-weight:800; letter-spacing:8px; padding:32px 64px; border-radius:24px; border:8px solid #fff; box-shadow:0 8px 40px rgba(0,0,0,.5); transform:rotate(-12deg); text-align:center; line-height:1.1; text-shadow:4px 4px 0px rgba(0,0,0,.3); }
.sold-out-sticker .sub { font-size:52px; font-weight:700; letter-spacing:4px; opacity:.9; display:block; }

/* ── LUCKY DRAW ── */
.lucky-overlay { position:fixed; inset:0; z-index:998; display:flex; align-items:center; justify-content:center; pointer-events:none; opacity:0; transition:opacity .3s; }
.lucky-overlay.visible { opacity:1; }
.lucky-box { background:linear-gradient(135deg,rgba(253,240,245,0.9),rgba(255,227,238,0.92)); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:3px solid rgba(196,79,130,0.5); border-radius:32px; padding:40px 64px; text-align:center; box-shadow:0 8px 40px rgba(196,79,130,.3), inset 0 1px 0 rgba(255,255,255,.8); }
.lucky-label { font-family:'Kanit',sans-serif; font-size:36px; font-weight:700; color:#c44f82; letter-spacing:4px; margin-bottom:12px; }
.lucky-number { font-family:'Kanit',sans-serif; font-size:140px; font-weight:800; color:#8b1a1a; line-height:1; letter-spacing:4px; }
.lucky-number.spinning { animation:luckyShake .1s infinite; }
@keyframes luckyShake { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.lucky-sub { font-family:'Sarabun',sans-serif; font-size:32px; font-weight:600; color:#a05070; margin-top:12px; }
</style>
</head>

<script>
var API_KEY      = 'AIzaSyBwIlvqugbNYNbFd44DtgKSZWsQrXNnSuI';
var PROJECT_ID   = 'chiccoco-live';
var DB_URL       = 'https://chiccoco-live-default-rtdb.asia-southeast1.firebasedatabase.app';
var STORAGE_BUCKET = 'chiccoco-live.firebasestorage.app';

var _shopId   = new URLSearchParams(window.location.search).get('shop') || 'default';
var _shopPath = 'chiccoco/shops/' + _shopId;
var _db=null, _state=null, _prod={}, _edits={}, _shopName='', _hiddenCodes={}, _bgTransparent=false, _productImages={}, _secondCode=null, _imagesLoaded=false;
var _timerLocal=0, _timerInterval=null;
var _soldOutManual=false;
var _imgLayout='small';

/* ── Sold Out Sticker ── */
function drawSoldOut(allSold, manualOn){
  var el=document.getElementById('sold-out-overlay');
  if(!el) return;
  if(allSold||manualOn) el.classList.add('visible');
  else el.classList.remove('visible');
}

/* ── Timer ── */
function drawTimer(d){
  var el=document.getElementById('OV-timer'),lbl=document.getElementById('OV-timer-label'),cnt=document.getElementById('OV-timer-count');
  if(_timerInterval){clearInterval(_timerInterval);_timerInterval=null;}
  if(!d||d.seconds<=0){el.classList.remove('visible');return;}
  lbl.textContent=d.label||'Flash Sale!';
  if(!d.running){_timerLocal=d.seconds;renderCount(cnt,_timerLocal);el.classList.add('visible');return;}
  var elapsed=Math.floor((Date.now()-d.ts)/1000);
  _timerLocal=Math.max(0,d.seconds-elapsed);
  if(_timerLocal<=0){el.classList.remove('visible');return;}
  renderCount(cnt,_timerLocal);el.classList.add('visible');
  _timerInterval=setInterval(function(){
    _timerLocal--;renderCount(cnt,_timerLocal);
    if(_timerLocal<=0){clearInterval(_timerInterval);_timerInterval=null;el.classList.remove('visible');}
  },1000);
}
function renderCount(el,sec){
  var m=Math.floor(sec/60),s=sec%60;
  el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  el.className='OV-timer-count'+(sec<=30?' warning':'');
}

/* ── Theme ── */
function applyBgOpacity(transparent){
  // inject <style> tag แทน inline style เพื่อไม่ถูก removeProperty ลบทิ้ง
  var tag=document.getElementById('_bg_opacity_style');
  if(!tag){ tag=document.createElement('style'); tag.id='_bg_opacity_style'; document.head.appendChild(tag); }
  if(transparent){
    var themeMap={
      'theme-pink':'rgba(253,240,245,0.80)',
      'theme-dark':'rgba(30,30,46,0.80)',
      'theme-minimal':'rgba(255,255,255,0.80)',
      'theme-gold':'rgba(253,248,238,0.80)',
    };
    var theme='';
    ['theme-pink','theme-dark','theme-minimal','theme-gold','theme-songkran','theme-loykatong','theme-newyearthai','theme-mothersday','theme-cny','theme-valentine','theme-halloween','theme-christmas','theme-newyear'].forEach(function(t){
      if(document.body.classList.contains(t)) theme=t;
    });
    var rgba=themeMap[theme]||'rgba(240,236,230,0.80)';
    tag.textContent='body,.OV,.OV.horizontal,.OV.visible{--ov-bg:'+rgba+' !important;}';
  } else {
    tag.textContent=''; // ลบ override ออก คืนค่า hex ทึบจาก :root CSS
  }
}
function applyTheme(theme,cc){
  document.body.className=document.body.className.replace(/theme-\S+/g,'').trim();
  var r=document.documentElement;
  ['--ov-bg','--ov-price-bg','--ov-header','--ov-code','--ov-accent','--ov-brand','--ov-text','--ov-muted','--ov-border','--ov-row-odd','--ov-row-even','--ov-footer','--ov-white'].forEach(function(v){r.style.removeProperty(v);});
  if(theme==='theme-custom'&&cc){
    r.style.setProperty('--ov-bg',cc.bg||'#f0ece6');r.style.setProperty('--ov-price-bg',cc.price||'#d9cfc4');
    r.style.setProperty('--ov-header',cc.header||'#3d4f47');r.style.setProperty('--ov-code',cc.code||'#8b1a1a');
    r.style.setProperty('--ov-accent',cc.accent||'#5c7a6b');r.style.setProperty('--ov-brand',cc.accent||'#5c7a6b');
    r.style.setProperty('--ov-text',cc.text||'#2c2c2c');
  } else if(theme&&theme!=='theme-custom'){document.body.classList.add(theme);}
  // ✅ apply opacity ทันทีหลัง set theme
  applyBgOpacity(_bgTransparent);
}

/* ── Firebase ── */
window.addEventListener('load',function(){
  var s1=document.createElement('script');
  s1.src='https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js';
  s1.onload=function(){
    var s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js';
    s2.onload=function(){
      var s3=document.createElement('script');
      s3.src='https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js';
      s3.onload=function(){
        // โหลด Storage SDK แล้วค่อย startDB
        const s4=document.createElement('script');
        s4.src='https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js';
        s4.onload=function(){startDB();};
        s4.onerror=function(){startDB();}; // ถ้า storage โหลดไม่ได้ก็ยังทำงานได้
        document.head.appendChild(s4);
      };
      s3.onerror=function(){startDB();};
      document.head.appendChild(s3);
    };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
});

function startDB(){
  try{
    if(!firebase.apps.length) firebase.initializeApp({apiKey:API_KEY,projectId:PROJECT_ID,databaseURL:DB_URL,storageBucket:STORAGE_BUCKET});
    _db=firebase.database();
    try{
      var fs=firebase.firestore();
      fs.collection('users').where('shopId','==',_shopId).limit(1).get()
      .then(function(snap){
        _shopName=(!snap.empty&&snap.docs[0].data().shopName)?snap.docs[0].data().shopName:'CHICCOCO';
        draw();
      }).catch(function(){_shopName='CHICCOCO';draw();});
    }catch(e){_shopName='CHICCOCO';draw();}

    // โหลดรูปสินค้าจาก Storage
    // โหลด URL รูปสินค้าจาก Realtime DB (ไม่มี CORS issue)
    _db.ref(_shopPath+'/productImages').on('value',function(snap){
      var d=snap.val();
      if(d){ Object.assign(_productImages,d); }
      _imagesLoaded=true;
      draw();
    });

    _db.ref(_shopPath+'/products').on('value',function(s){var d=s.val();if(d){_prod=d;try{draw();}catch(e){console.error('draw/products err:',e);}}});
    _db.ref(_shopPath+'/state').on('value',function(s){
      var d=s.val();if(d){
        _state=d;
        _hiddenCodes=d.hiddenCodes||{};
        _secondCode=d.secondCode||null;
        _bgTransparent=d.bgTransparent||false;
        _imgLayout=d.imgLayout||'small';
        _soldOutManual=d.soldOutSticker||false;
        try{ if(d.theme!==undefined) applyTheme(d.theme,d.customColors); }catch(e){ console.warn('applyTheme err:',e); }
        try{ applyBgOpacity(_bgTransparent); }catch(e){ console.warn('applyBgOpacity err:',e); }
        try{ draw(); }catch(e){ console.error('draw() err:',e); }
      }
    });
    _db.ref(_shopPath+'/lucky').on('value',function(s){
      var d=s.val();
      var el=document.getElementById('lucky-overlay');
      var numEl=document.getElementById('lucky-number');
      var subEl=document.getElementById('lucky-sub');
      if(!d){ if(el) el.classList.remove('visible'); return; }
      if(d.isSpinning){
        if(el) el.classList.add('visible');
        if(numEl){ numEl.textContent=d.spinning!=null?d.spinning:'—'; numEl.classList.add('spinning'); }
        if(subEl) subEl.textContent='กำลังสุ่ม...';
      } else if(d.winner!=null){
        if(el) el.classList.add('visible');
        if(numEl){ numEl.textContent=d.winner; numEl.classList.remove('spinning'); }
        if(subEl) subEl.textContent='🎉 ยินดีด้วยค่ะ! 🎉';
      } else {
        if(el) el.classList.remove('visible');
      }
    });
    _db.ref(_shopPath+'/timer').on('value',function(s){
      drawTimer(s.val());
      // sync timer width กับ OV ที่มีอยู่
      var ov=document.getElementById('OV');
      if(ov&&ov.style.width){
        document.getElementById('OV-timer').style.width=ov.style.width;
      }
    });
    _db.ref(_shopPath+'/edits').on('value',function(s){_edits=s.val()||{};draw();});
  }catch(e){console.error('Firebase error',e);}
}

/* ── Helpers ── */
function getP(code){
  var p=_prod[code];if(!p)return null;
  var p2=Object.assign({},p),e=_edits[code];
  if(e){if(e.name)p2.name=e.name;if(e.color)p2.color=e.color;if(e.material)p2.material=e.material;if(e.size)p2.size=e.size;if(e.price)p2.price=e.price;if(e.sizes)p2.sizes=e.sizes;}
  return p2;
}
function fmt(v){var n=Number(v);return isNaN(n)?v:n.toLocaleString();}

function makeSecondOV(){
  if(!_secondCode||!_prod[_secondCode]) return '';
  var p=getP(_secondCode);
  if(!p) return '';

  var divider='<div class="OV-second-divider"><div class="OV-second-divider-line"></div><div class="OV-second-divider-text">แมตช์กับ</div><div class="OV-second-divider-line"></div></div>';

  // ── สินค้าเบ็ดเตล็ด (misc) ──
  if(p.type==='misc'){
    var ms=p.size||(p.sizes&&p.sizes.length?p.sizes.map(function(s){return s.size;}).filter(Boolean).join(', '):'');
    var infoHtml2='';
    if(p.color||p.material){
      infoHtml2='<div class="OV-inforow">';
      if(p.color)    infoHtml2+='<div class="OV-info"><div class="OV-info-lbl">สี</div><div class="OV-info-val" style="font-size:50px;">'+p.color+'</div></div>';
      if(p.material) infoHtml2+='<div class="OV-info"><div class="OV-info-lbl">วัสดุ</div><div class="OV-info-val" style="font-size:40px;">'+p.material+'</div></div>';
      infoHtml2+='</div>';
    }
    var tableHtml2='';
    if(ms){
      tableHtml2='<table class="OV-table"><thead><tr><th>ไซส์</th></tr></thead>'
        +'<tbody><tr><td style="font-size:36px;font-weight:600;color:#2c2c2c;padding:10px;">'+ms+'</td></tr></tbody></table>';
    }
    return '<div class="OV-second">'
      +divider
      +'<div class="OV-toprow">'
        +'<div class="OV-box"><div class="OV-box-lbl">รหัสสินค้า</div><div class="OV-box-code">'+p.code+'</div></div>'
        +(ms?'<div class="OV-box"><div class="OV-box-lbl">ขนาด</div><div class="OV-box-sizes" style="font-size:26px;line-height:1.4;">'+ms+'</div></div>':'')
      +'</div>'
      +'<div class="OV-price"><div class="OV-price-lbl">ราคา</div><div class="OV-price-num">'+fmt(p.price)+'</div></div>'
      +'<div class="OV-name">'+p.name+'</div>'
      +infoHtml2
      +'</div>';
  }

  // ── สินค้าเสื้อผ้า (clothing) ──
  var sold=_state&&_state.secondSoldSizes?_state.secondSoldSizes:[];
  var co=p.activeCols||[];
  var av=(p.sizes||[]).filter(function(s){ return sold.indexOf(s.size)===-1; });
  var lb=av.map(function(s){ return s.size; }).filter(Boolean);
  var totalCols=co.length+1;
  var cellW=Math.floor(660/totalCols);
  var hdrFs=totalCols<=3?26:totalCols<=5?22:18;

  // price block
  var ph='<div class="OV-price"><div class="OV-price-lbl">ราคา</div><div class="OV-price-num">'+fmt(p.price)+'</div></div>';

  // table
  var rows=av.map(function(s){
    var sFs=autoFs(s.size,cellW,40,16);
    var cells='<td style="font-size:'+sFs+'px;font-weight:800;color:var(--ov-code);font-family:Kanit,sans-serif;">'+s.size+'</td>';
    co.forEach(function(col){
      var val=s[col]||'—';
      var vFs=autoFs(val,cellW,44,16);
      cells+='<td style="font-size:'+vFs+'px;">'+val+'</td>';
    });
    return '<tr>'+cells+'</tr>';
  }).join('');
  var tableHtml=rows?'<table class="OV-table"><thead><tr><th style="font-size:'+hdrFs+'px;">ไซส์</th>'+co.map(function(col){ return '<th style="font-size:'+hdrFs+'px;">'+col+'</th>'; }).join('')+'</tr></thead><tbody>'+rows+'</tbody></table>':'';

  // info row
  var infoHtml='';
  if(p.color||p.material){
    var ivFs=infoValFs(p.color,p.material,44);
    infoHtml='<div class="OV-inforow">';
    if(p.color)    infoHtml+='<div class="OV-info"><div class="OV-info-lbl">สี</div><div class="OV-info-val" style="font-size:50px;">'+p.color+'</div></div>';
    if(p.material) infoHtml+='<div class="OV-info"><div class="OV-info-lbl">วัสดุ</div><div class="OV-info-val" style="font-size:'+ivFs+'px;">'+p.material+'</div></div>';
    infoHtml+='</div>';
  }

  return '<div class="OV-second">'
    +divider
    +'<div class="OV-toprow">'
      +'<div class="OV-box"><div class="OV-box-lbl">รหัสสินค้า</div><div class="OV-box-code">'+p.code+'</div></div>'
      +'<div class="OV-box"><div class="OV-box-lbl">ไซส์</div><div class="OV-box-sizes">'+(lb.join(', ')||'—')+'</div></div>'
    +'</div>'
    +ph
    +'<div class="OV-name">'+p.name+'</div>'
    +infoHtml
    +tableHtml
    +'</div>';
}


function makeColorGroup(currentCode){
  // หาสินค้าที่มี groupId เดียวกัน
  var p=_prod[currentCode]; if(!p||!p.groupId) return '';
  var group=Object.keys(_prod).filter(function(k){
    return _prod[k].groupId===p.groupId && !_hiddenCodes[k];
  });
  if(group.length<=1) return ''; // ไม่แสดงถ้ามีสีเดียว
  var pills=group.map(function(code){
    var item=_prod[code];
    var isActive=(code===currentCode);
    var activeCls=isActive?' active':'';
    return '<div class="OV-color-pill'+activeCls+'">'
      +code+' '+( item.color||'')
      +'</div>';
  }).join('');
  return '<div class="OV-color-group">'
    +'<div class="OV-color-group-lbl">สีที่มี</div>'
    +'<div class="OV-color-pills">'+pills+'</div>'
    +'</div>';
}

/* autoFs: คำนวณ font-size ให้พอดีกับ cell — ใช้ทั้ง vertical และ horizontal */
function autoFs(val,cellW,base,min){
  var len=String(val||'').length;if(len===0)return base;
  return Math.min(base,Math.max(min,Math.floor(cellW/(len*0.58))));
}

/* infoVal font-size: ขนาดเท่ากันทั้งสี+วัสดุ แต่ถ้ายาวให้เล็กลง */
function infoValFs(color,material,base){
  return 50; /* 50px คงที่ — ตัดบรรทัดอัตโนมัติถ้ายาว */
}

/* ── Draw ── */
function draw(){
  if(!_state||!_state.code)return;
  var ov=document.getElementById('OV');
  if(!ov){ console.error('OV element not found'); return; }
  // ✅ ถ้า hidden=true ให้ซ่อน overlay ทั้งหมด
  if(_state.hidden){
    ov.className='OV';
    return;
  }
  var p=getP(_state.code);if(!p)return;
  var sold=_state.soldSizes||[],sale=_state.salePrice||null;
  var av=(p.sizes||[]).filter(function(s){return sold.indexOf(s.size)===-1;});
  var lb=av.map(function(s){return s.size;}).filter(Boolean);
  var co=p.activeCols||[];
  var brand=_shopName||'CHICCOCO';
  var isH=(_state.layout==='horizontal');

  var ph=sale
    ?'<div class="OV-price"><div class="OV-price-lbl">ราคา</div><div class="OV-price-sale"><div class="OV-price-original">'+fmt(p.price)+'</div><div class="OV-price-new">'+fmt(sale)+'</div></div></div>'
    :'<div class="OV-price"><div class="OV-price-lbl">ราคา</div><div class="OV-price-num">'+fmt(p.price)+'</div></div>';

  /* ── ขนาด cell สำหรับตาราง ── */
  var totalCols=co.length+1;
  var OVW=isH?1200:720; /* horizontal กว้างขึ้น */
  var tableW=isH?Math.round(OVW*0.58):OVW-48;
  var cellW=Math.floor(tableW/totalCols);
  var hdrFs=35;
  var tdBase=44; /* ใช้ขนาดเดียวกัน */
  var tdMin=isH?18:18;

  /* infoVal size เท่ากันทั้งสี+วัสดุ */
  var ivFs=infoValFs(p.color,p.material,44);

  /* สร้าง inforow */
  function makeInfoRow(){
    if(!p.color&&!p.material)return '';
    // ✅ สี: 50px คงที่ ตัดบรรทัดอัตโนมัติ
    var colorFs=50;
    // ✅ วัสดุ: 50px แต่ลดอัตโนมัติถ้ายาว
    var matLen=(p.material||'').length;
    var matFs=matLen<=6?50:matLen<=12?44:matLen<=18?38:matLen<=26?32:26;
    var inner='';
    if(p.color)    inner+='<div class="OV-info"><div class="OV-info-lbl">สี</div><div class="OV-info-val" style="font-size:'+colorFs+'px;white-space:normal;overflow-wrap:break-word;word-break:break-word;">'+p.color+'</div></div>';
    if(p.material) inner+='<div class="OV-info"><div class="OV-info-lbl">วัสดุ</div><div class="OV-info-val" style="font-size:'+matFs+'px;white-space:normal;overflow-wrap:break-word;word-break:break-word;">'+p.material+'</div></div>';
    return '<div class="OV-inforow">'+inner+'</div>';
  }

  /* สร้างตาราง */
  function makeTable(){
    if(p.type==='misc'||!av.length)return '';
    var rows=av.map(function(s){
      var sFs=40;
      var cells='<td style="font-size:'+sFs+'px;font-weight:800;color:var(--ov-code);font-family:\'Kanit\',sans-serif;padding:10px 4px;">'+s.size+'</td>';
      co.forEach(function(col){
        var val=s[col]||'—';
        var vFs=44;
        cells+='<td style="font-size:'+vFs+'px;padding:10px 4px;white-space:normal;overflow-wrap:break-word;word-break:break-word;">'+val+'</td>';
      });
      return '<tr>'+cells+'</tr>';
    }).join('');
    var thead='<tr><th style="font-size:'+hdrFs+'px;padding:12px 4px;">ไซส์</th>'+co.map(function(col){return '<th style="font-size:'+hdrFs+'px;padding:12px 4px;">'+col+'</th>';}).join('')+'</tr>';
    return '<table class="OV-table"><thead>'+thead+'</thead><tbody>'+rows+'</tbody></table>';
  }

  /* ── HORIZONTAL ── */
  if(isH){
    var miscSize=p.size||(p.sizes&&p.sizes.length?p.sizes.map(function(s){return s.size;}).filter(Boolean).join(', '):'');
    var rightContent=p.type==='misc'
      ?(miscSize?'<div class="OV-box"><div class="OV-box-lbl">ขนาดสินค้า</div><div class="OV-box-sizes">'+miscSize+'</div></div>':'')
      :'<div class="OV-box"><div class="OV-box-lbl">ไซส์เหลือ</div><div class="OV-box-sizes">'+(lb.join(', ')||'—')+'</div></div>'+makeTable();

    var ovW=Math.min(OVW, window.innerWidth || 720);
    ov.style.width=ovW+'px';
    // ✅ sync timer width ให้พอดีกับ OV
    document.getElementById('OV-timer').style.width=ovW+'px';
    ov.innerHTML=
      '<div class="OV-brand">'+brand+'</div>'
      +'<div style="display:flex;gap:16px;align-items:stretch;width:100%;">'
        +'<div class="OV-col-L">'
          +(function(){
        var imgUrl=_productImages[p.code]||_productImages[(p.code||'').toUpperCase()]||_productImages[(p.code||'').toLowerCase()]||null;
        if(imgUrl&&_imgLayout==='small'){
          return '<div class="OV-box"><div class="OV-box-with-img"><img class="OV-prod-img" src="'+imgUrl+'"><div><div class="OV-box-lbl">รหัสสินค้า</div><div class="OV-box-code">'+p.code+'</div></div></div></div>';
        }
        return '<div class="OV-box"><div class="OV-box-lbl">รหัสสินค้า</div><div class="OV-box-code">'+p.code+'</div></div>';
      })()
          +ph
          +'<div class="OV-name" style="text-align:center;font-size:32px;">'+p.name+'</div>'
          +makeInfoRow()
        +'</div>'
        +'<div class="OV-col-R">'+rightContent+'</div>'
      +'</div>'
      +'<div class="OV-footer">'+brand+' Live @ 2025</div>';
    ov.className='OV horizontal visible';

  /* ── VERTICAL ── */
  } else {
    var ovW=Math.min(720, window.innerWidth || 720);
    ov.style.width=ovW+'px';
    // ✅ sync timer width ให้พอดีกับ OV
    document.getElementById('OV-timer').style.width=ovW+'px';
    var h='';
    // ✅ รูปใหญ่ด้านบน
    var _imgUrlLg=_productImages[p.code]||_productImages[(p.code||'').toUpperCase()]||_productImages[(p.code||'').toLowerCase()]||null;
    var _largeBanner=(_imgUrlLg&&_imgLayout==='large')
      ?'<div class="OV-img-banner"><img src="'+_imgUrlLg+'"></div>'
      :'';
    if(p.type==='misc'){
      var ms2=p.size||(p.sizes&&p.sizes.length?p.sizes.map(function(s){return s.size;}).filter(Boolean).join(', '):'');
      h=_largeBanner+'<div class="OV-brand">'+brand+'</div>'
        +'<div class="OV-toprow">'
          +(function(){
        var imgUrl=_productImages[p.code]||_productImages[(p.code||'').toUpperCase()]||_productImages[(p.code||'').toLowerCase()]||null;
        if(imgUrl&&_imgLayout==='small'){
          return '<div class="OV-box"><div class="OV-box-with-img"><img class="OV-prod-img" src="'+imgUrl+'"><div><div class="OV-box-lbl">รหัสสินค้า</div><div class="OV-box-code">'+p.code+'</div></div></div></div>';
        }
        return '<div class="OV-box"><div class="OV-box-lbl">รหัสสินค้า</div><div class="OV-box-code">'+p.code+'</div></div>';
      })()
          +ph.replace('class="OV-price"','class="OV-price" style="flex:1"')
        +'</div>'
        +'<div class="OV-name">'+p.name+'</div>'
        +makeInfoRow()
        +(ms2?'<div class="OV-inforow"><div class="OV-info"><div class="OV-info-lbl">ขนาด</div><div class="OV-info-val" style="font-size:38px;white-space:normal;overflow-wrap:break-word;word-break:break-word;">'+ms2+'</div></div></div>':'')
        +makeColorGroup(p.code)+makeSecondOV()+'<div class="OV-footer">Chiccoco Live @ 2025</div>';
    } else {
      h=_largeBanner+'<div class="OV-brand">'+brand+'</div>'
        +'<div class="OV-toprow">'
          +(function(){
        var imgUrl=_productImages[p.code]||_productImages[(p.code||'').toUpperCase()]||_productImages[(p.code||'').toLowerCase()]||null;
        if(imgUrl&&_imgLayout==='small'){
          return '<div class="OV-box"><div class="OV-box-with-img"><img class="OV-prod-img" src="'+imgUrl+'"><div><div class="OV-box-lbl">รหัสสินค้า</div><div class="OV-box-code">'+p.code+'</div></div></div></div>';
        }
        return '<div class="OV-box"><div class="OV-box-lbl">รหัสสินค้า</div><div class="OV-box-code">'+p.code+'</div></div>';
      })()
          +'<div class="OV-box"><div class="OV-box-lbl">ไซส์</div><div class="OV-box-sizes">'+(lb.join(', ')||'—')+'</div></div>'
        +'</div>'
        +ph
        +'<div class="OV-name">'+p.name+'</div>'
        +makeInfoRow()
        +makeTable()
        +makeColorGroup(p.code)+makeSecondOV()+'<div class="OV-footer">Chiccoco Live @ 2025</div>';
    }
    ov.innerHTML=h;
    ov.className='OV visible';
    var allSold=p.type!=='misc'&&av.length===0&&(p.sizes||[]).length>0;
    drawSoldOut(allSold, _soldOutManual);
  }
}
</script>
