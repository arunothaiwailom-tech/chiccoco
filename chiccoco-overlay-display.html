<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>chiccoco — Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Kanit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html, body { background: transparent !important; width:720px; overflow:hidden; }
.OV { width:720px; background:#f0ece6; font-family:'Sarabun',sans-serif; padding:36px 30px; display:flex; flex-direction:column; gap:14px; opacity:0; transition:opacity .4s; }
.OV.visible { opacity:1; }
.OV-brand { text-align:center; font-size:18px; font-weight:400; letter-spacing:12px; color:#5c7a6b; flex-shrink:0; }
.OV-toprow { display:flex; gap:12px; flex-shrink:0; }
.OV-box { background:white; border-radius:16px; padding:16px 20px; text-align:center; flex:1; box-shadow:0 1px 6px rgba(0,0,0,.05); }
.OV-box-lbl { font-size:25px; font-weight:400; color:#888880; margin-bottom:8px; }
.OV-box-code { font-size:72px; font-weight:800; color:#8b1a1a; line-height:1; letter-spacing:1px; }
.OV-box-sizes { font-size:72px; font-weight:800; color:#8b1a1a; line-height:1; }
.OV-price { background:#d9cfc4; border-radius:16px; text-align:center; padding:18px 20px; flex-shrink:0; }
.OV-price-lbl { font-size:25px; font-weight:400; color:#7a6e65; margin-bottom:4px; }
.OV-price-num { font-size:72px; font-weight:800; color:#2c2c2c; line-height:1; }
.OV-price-sale { display:flex; flex-direction:column; align-items:center; gap:2px; }
.OV-price-original { font-size:36px; font-weight:700; color:#9a8e85; text-decoration:line-through; line-height:1; }
.OV-price-new { font-size:72px; font-weight:800; color:#8b1a1a; line-height:1; }
.OV-name { font-size:40px; font-weight:700; color:#2c2c2c; text-align:center; line-height:1.35; flex-shrink:0; }
.OV-inforow { display:flex; background:white; border-radius:16px; overflow:hidden; flex-shrink:0; box-shadow:0 1px 6px rgba(0,0,0,.05); }
.OV-info { flex:1; padding:14px 16px; text-align:center; }
.OV-info+.OV-info { border-left:1px solid #ede9e4; }
.OV-info-lbl { font-size:25px; color:#888880; font-weight:400; margin-bottom:6px; }
.OV-info-val { font-size:40px; font-weight:700; color:#2c2c2c; line-height:1.3; }
.OV-table { width:100%; border-collapse:separate; border-spacing:0; border-radius:16px; overflow:hidden; flex-shrink:0; box-shadow:0 1px 6px rgba(0,0,0,.05); }
.OV-table thead tr { background:#3d4f47; }
.OV-table thead th { color:white; padding:14px 10px; font-size:30px; font-weight:700; text-align:center; }
.OV-table tbody tr:nth-child(odd) { background:white; }
.OV-table tbody tr:nth-child(even) { background:#f5f1eb; }
.OV-table tbody td { padding:13px 10px; text-align:center; font-size:40px; font-weight:600; color:#2c2c2c; }
.OV-table tbody td:first-child { font-size:42px; font-weight:800; color:#3d4f47; }
</style>
</head>
<body>
<div class="OV" id="OV"></div>
<script>
var _db=null,_state=null,_prod={};

// ── Firebase config ฝังไว้เลย ไม่ต้องกรอก ──
var API_KEY    = "AIzaSyBwIlvqugbNYNbFd44DtgKSZWsQrXNnSuI";
var PROJECT_ID = "chiccoco-live";
var DB_URL     = "https://chiccoco-live-default-rtdb.asia-southeast1.firebasedatabase.app";

window.addEventListener('load', function(){
  var s1=document.createElement('script');
  s1.src='https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js';
  s1.onload=function(){
    var s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js';
    s2.onload=function(){ go(); };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
});

function go(){
  try{
    if(!firebase.apps.length) firebase.initializeApp({apiKey:API_KEY,projectId:PROJECT_ID,databaseURL:DB_URL});
    _db=firebase.database();
    _db.ref('chiccoco/products').on('value',function(s){var d=s.val();if(d){_prod=d;draw();}});
    _db.ref('chiccoco/state').on('value',function(s){var d=s.val();if(d){_state=d;draw();}});
  }catch(e){ console.error('Firebase error',e); }
}

function fmt(v){var n=Number(v);return isNaN(n)?v:n.toLocaleString();}

function draw(){
  if(!_state||!_state.code)return;
  var p=_prod[_state.code];if(!p)return;
  var sold=_state.soldSizes||[],sale=_state.salePrice||null;
  var av=(p.sizes||[]).filter(function(s){return sold.indexOf(s.size)===-1;});
  var lb=av.map(function(s){return s.size;}).filter(Boolean);
  var co=p.activeCols||[];
  var ph=sale
    ?'<div class="OV-price"><div class="OV-price-lbl">ราคา</div><div class="OV-price-sale"><div class="OV-price-original">'+fmt(p.price)+'</div><div class="OV-price-new">'+fmt(sale)+'</div></div></div>'
    :'<div class="OV-price"><div class="OV-price-lbl">ราคา</div><div class="OV-price-num">'+fmt(p.price)+'</div></div>';
  var rows=av.map(function(s){return '<tr><td>'+s.size+'</td>'+co.map(function(c){return '<td>'+(s[c]||'—')+'</td>';}).join('')+'</tr>';}).join('');
  var h='';
  if(p.type==='misc'){
    h='<div class="OV-brand">C H I C C O C O</div>'
     +'<div class="OV-toprow"><div class="OV-box" style="flex:1.2"><div class="OV-box-lbl">รหัสสินค้า</div><div class="OV-box-code">'+p.code+'</div></div>'
     +ph.replace('class="OV-price"','class="OV-price" style="flex:1"')+'</div>'
     +'<div class="OV-name">'+p.name+'</div>'
     +'<div class="OV-inforow">'
     +(p.color?'<div class="OV-info"><div class="OV-info-lbl">สี</div><div class="OV-info-val">'+p.color+'</div></div>':'')
     +(p.size?'<div class="OV-info"><div class="OV-info-lbl">ขนาดสินค้า</div><div class="OV-info-val">'+p.size+'</div></div>':'')
     +'</div>';
  }else{
    h='<div class="OV-brand">C H I C C O C O</div>'
     +'<div class="OV-toprow">'
     +'<div class="OV-box" style="flex:1.1"><div class="OV-box-lbl">รหัสสินค้า</div><div class="OV-box-code">'+p.code+'</div></div>'
     +'<div class="OV-box" style="flex:1"><div class="OV-box-lbl">ไซส์</div><div class="OV-box-sizes">'+(lb.join(', ')||'—')+'</div></div>'
     +'</div>'
     +ph
     +'<div class="OV-name">'+p.name+'</div>'
     +'<div class="OV-inforow">'
     +(p.color?'<div class="OV-info"><div class="OV-info-lbl">สี</div><div class="OV-info-val">'+p.color+'</div></div>':'')
     +(p.material?'<div class="OV-info"><div class="OV-info-lbl">วัสดุ</div><div class="OV-info-val" style="font-size:30px">'+p.material+'</div></div>':'')
     +'</div>'
     +(rows?'<table class="OV-table"><thead><tr><th>ไซส์</th>'+co.map(function(c){return '<th>'+c+'</th>';}).join('')+'</tr></thead><tbody>'+rows+'</tbody></table>':'');
  }
  var ov=document.getElementById('OV');
  ov.innerHTML=h;
  ov.className='OV visible';
}
</script>
</body>
</html>
