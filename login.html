<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chiccoco — เข้าสู่ระบบ</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Sarabun',sans-serif;
  background:linear-gradient(135deg, #1a0a0f 0%, #2d0f1e 50%, #1a0a0f 100%);
  min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
}
.card {
  background:rgba(30,15,20,0.95);
  border:1px solid rgba(255,100,150,0.2);
  border-radius:24px; padding:40px 32px;
  width:100%; max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.logo { text-align:center; margin-bottom:32px; }
.logo-icon { font-size:48px; margin-bottom:12px; }
.logo h1 {
  font-family:'Kanit',sans-serif; font-size:32px; font-weight:800;
  background:linear-gradient(135deg, #ff6b9d, #c44f82);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  letter-spacing:4px;
}
.logo p { color:#888; font-size:13px; margin-top:4px; }

.field { margin-bottom:20px; }
.field label { display:block; font-size:13px; color:#ccc; margin-bottom:8px; font-family:'Kanit',sans-serif; }
.field input {
  width:100%; padding:14px 16px;
  background:rgba(255,255,255,0.08); border:1.5px solid rgba(255,255,255,0.15);
  border-radius:12px; color:white; font-size:15px; outline:none;
  font-family:'Sarabun',sans-serif; transition:border-color .2s;
}
.field input:focus { border-color:#ff6b9d; }
.field input::placeholder { color:#666; }
.pass-wrap { position:relative; }
.pass-wrap input { padding-right:50px; }
.toggle-pass {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:#888; cursor:pointer; font-size:18px;
}

.btn-login {
  width:100%; padding:15px;
  background:linear-gradient(135deg, #ff6b9d, #c44f82);
  color:white; border:none; border-radius:12px;
  font-family:'Kanit',sans-serif; font-size:16px; font-weight:700;
  cursor:pointer; margin-top:8px; transition:opacity .2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-login:disabled { opacity:0.6; cursor:not-allowed; }

.error-box {
  margin-top:12px; padding:12px 16px;
  background:rgba(220,50,50,0.15); border:1px solid rgba(220,50,50,0.3);
  border-radius:10px; color:#ff8080; font-size:13px; text-align:center;
  display:none;
}
.error-box.show { display:block; }

.forgot-link {
  display:block; text-align:center; margin-top:16px;
  color:#c44f82; font-size:13px; cursor:pointer; text-decoration:underline;
  background:none; border:none; width:100%; font-family:'Sarabun',sans-serif;
}

.forgot-panel {
  display:none; margin-top:16px; padding:16px;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,100,150,0.2);
  border-radius:12px;
}
.forgot-panel .title { font-family:'Kanit',sans-serif; font-size:13px; color:#ff6b9d; margin-bottom:8px; font-weight:700; }
.forgot-panel .hint { font-size:12px; color:#888; margin-bottom:10px; }
.forgot-panel input {
  width:100%; padding:10px 14px;
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
  border-radius:8px; color:white; font-size:14px; outline:none; margin-bottom:10px;
  font-family:'Sarabun',sans-serif;
}
.forgot-panel input:focus { border-color:#ff6b9d; }
.btn-reset {
  width:100%; padding:10px;
  background:rgba(255,107,157,0.2); color:#ff6b9d;
  border:1px solid rgba(255,107,157,0.4); border-radius:8px;
  font-family:'Kanit',sans-serif; font-size:13px; font-weight:700; cursor:pointer;
}
.btn-reset:disabled { opacity:0.5; }
.reset-msg { font-size:12px; text-align:center; margin-top:8px; }
.btn-cancel-forgot {
  display:block; text-align:center; margin-top:8px;
  color:#666; font-size:12px; cursor:pointer; background:none; border:none;
  width:100%; font-family:'Sarabun',sans-serif;
}

.footer { text-align:center; margin-top:24px; color:#444; font-size:11px; }

@keyframes spin { to { transform:rotate(360deg); } }
.spinner {
  width:16px; height:16px; border:2px solid rgba(255,255,255,0.3);
  border-top-color:white; border-radius:50%; animation:spin .6s linear infinite;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🎀</div>
    <h1>CHICCOCO</h1>
    <p>ระบบจัดการ Live Display</p>
  </div>

  <div class="field">
    <label>อีเมล</label>
    <input type="email" id="emailInput" placeholder="example@email.com" autocomplete="email">
  </div>

  <div class="field">
    <label>รหัสผ่าน</label>
    <div class="pass-wrap">
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
      <button class="toggle-pass" type="button" id="togglePass" onclick="togglePassword()">👁</button>
    </div>
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>

  <div class="error-box" id="errorBox"></div>

  <button class="forgot-link" onclick="toggleForgot()">ลืมรหัสผ่าน?</button>

  <div class="forgot-panel" id="forgotPanel">
    <div class="title">🔑 รีเซ็ตรหัสผ่าน</div>
    <div class="hint">ระบบจะส่งลิงก์เปลี่ยนรหัสผ่านไปที่อีเมลของคุณค่ะ</div>
    <input type="email" id="resetEmail" placeholder="กรอกอีเมลที่ลงทะเบียนไว้">
    <button class="btn-reset" id="resetBtn" onclick="doReset()">📧 ส่งลิงก์รีเซ็ตรหัสผ่าน</button>
    <div class="reset-msg" id="resetMsg"></div>
    <button class="btn-cancel-forgot" onclick="toggleForgot()">ยกเลิก</button>
  </div>

  <div class="footer">Chiccoco Live © 2025</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBwIlvqugbNYNbFd44DtgKSZWsQrXNnSuI",
  authDomain: "chiccoco-live.firebaseapp.com",
  projectId: "chiccoco-live",
  storageBucket: "chiccoco-live.appspot.com",
  messagingSenderId: "556795503566",
  appId: "1:556795503566:web:3aeab9daa3ae0352ad819f"
});
const auth = getAuth(app);
const db = getFirestore(app);

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}

window.togglePassword = function() {
  const inp = document.getElementById('passwordInput');
  const btn = document.getElementById('togglePass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
};

window.toggleForgot = function() {
  const panel = document.getElementById('forgotPanel');
  const isOpen = panel.style.display === 'block';
  panel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) {
    const email = document.getElementById('emailInput').value.trim();
    if (email) document.getElementById('resetEmail').value = email;
    document.getElementById('resetEmail').focus();
  }
};

window.doLogin = async function() {
  hideError();
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const btn = document.getElementById('loginBtn');

  if (!email || !password) { showError('กรุณากรอกอีเมลและรหัสผ่านค่ะ'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>กำลังเข้าสู่ระบบ...';

  try {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const uid = cred.user.uid;

    const snap = await getDoc(doc(db, 'users', uid));
    if (!snap.exists()) {
      showError('ไม่พบข้อมูลผู้ใช้ กรุณาติดต่อ @395vujby ค่ะ');
      btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ'; return;
    }

    const data = snap.data();
    const status = data.status || 'active';
    const expireDate = data.expireDate || '2099-12-31';
    const isAdmin = data.role === 'admin';

    // บันทึก session
    sessionStorage.setItem('uid', uid);
    sessionStorage.setItem('role', data.role || '');
    sessionStorage.setItem('shopId', data.shopId || '');
    sessionStorage.setItem('shopName', data.shopName || '');
    sessionStorage.setItem('expireDate', expireDate);

    if (!isAdmin) {
      if (status === 'suspended') {
        showError('บัญชีถูกระงับ กรุณาติดต่อ @395vujby ค่ะ');
        btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ'; return;
      }
      // ใช้ local date เพื่อป้องกัน timezone offset (UTC vs UTC+7)
      const now = new Date();
      const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
      if (expireDate < today) {
        window.location.href = 'renew.html'; return;
      }
    }

    // redirect
    window.location.href = isAdmin ? 'admin.html' : 'chiccoco-remote.html';

  } catch(e) {
    console.error('Login error:', e.code, e.message);
    const msgs = {
      'auth/user-not-found': 'ไม่พบอีเมลนี้ในระบบค่ะ',
      'auth/wrong-password': 'รหัสผ่านไม่ถูกต้องค่ะ',
      'auth/invalid-credential': 'อีเมลหรือรหัสผ่านไม่ถูกต้องค่ะ',
      'auth/invalid-email': 'รูปแบบอีเมลไม่ถูกต้องค่ะ',
      'auth/too-many-requests': 'พยายามเข้าสู่ระบบบ่อยเกินไป กรุณารอสักครู่ค่ะ',
      'auth/network-request-failed': 'ไม่มีการเชื่อมต่ออินเทอร์เน็ต กรุณาตรวจสอบค่ะ',
    };
    showError(msgs[e.code] || 'เกิดข้อผิดพลาด: ' + e.message);
    btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
  }
};

window.doReset = async function() {
  const email = document.getElementById('resetEmail').value.trim();
  const msgEl = document.getElementById('resetMsg');
  const btn = document.getElementById('resetBtn');

  if (!email) { msgEl.style.color='#ff8080'; msgEl.textContent='กรุณากรอกอีเมลค่ะ'; return; }

  btn.disabled = true; btn.textContent = '⏳ กำลังส่ง...';
  try {
    await sendPasswordResetEmail(auth, email);
    msgEl.style.color = '#5c7a6b';
    msgEl.textContent = '✅ ส่งลิงก์ไปที่ ' + email + ' แล้วค่ะ (เช็ค Spam ด้วยนะคะ)';
    btn.textContent = '✅ ส่งแล้ว';
  } catch(e) {
    msgEl.style.color = '#ff8080';
    msgEl.textContent = e.code === 'auth/user-not-found' ? '❌ ไม่พบอีเมลนี้ในระบบค่ะ' : '❌ ' + e.message;
    btn.disabled = false; btn.textContent = '📧 ส่งลิงก์รีเซ็ตรหัสผ่าน';
  }
};

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.doLogin();
});
</script>
</body>
</html>
