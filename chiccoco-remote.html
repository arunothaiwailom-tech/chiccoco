<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
  // --- ⚠️ BYPASS LOGIN (จัดการตัวตนให้ใช้งานได้ทันที) ---
  const MOCK_UID = 'P1vVzY5QpQfXn4M8Rj2L7sK9W6t1'; // UID สำหรับ Bypass
  const MOCK_SHOP_ID = 'chiccocoshop';
  const MOCK_SHOP_NAME = 'CHICCOCOSHOP';

  // ตั้งค่า Session ชั่วคราวถ้ายังไม่มี
  if (!sessionStorage.getItem('uid')) {
    sessionStorage.setItem('uid', MOCK_UID);
    sessionStorage.setItem('shopId', MOCK_SHOP_ID);
    sessionStorage.setItem('shopName', MOCK_SHOP_NAME);
    sessionStorage.setItem('role', 'owner');
  }

  // --- FIREBASE SETUP ---
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, off, once, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBwIlvqugbNYNbFd44DtgKSZWsQrXNnSuI",
    authDomain: "chiccoco-live.firebaseapp.com",
    databaseURL: "https://chiccoco-live-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "chiccoco-live",
    storageBucket: "chiccoco-live.firebasestorage.app",
    messagingSenderId: "556795503566",
    appId: "1:556795503566:web:3aeab9daa3ae0352ad819f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const shopId = sessionStorage.getItem('shopId') || 'default';
  const shopPath = `chiccoco/shops/${shopId}`;

  // --- GLOBAL STATE & FUNCTIONS ---
  window.products = {};
  window.currentCode = null;
  window.soldSizes = [];
  window.salePrice = null;

  // เชื่อมต่อสถานะออนไลน์
  onValue(ref(db, '.info/connected'), (snap) => {
    const statusTxt = document.getElementById('statusTxt');
    const statusDot = document.getElementById('statusDot');
    if (snap.val() === true) {
      statusTxt.textContent = "✅ เชื่อมต่อแล้ว (Bypass Mode)";
      statusDot.className = "status-dot connected";
    } else {
      statusTxt.textContent = "⚠️ กำลังเชื่อมต่อ...";
      statusDot.className = "status-dot";
    }
  });

  // ฟังการเปลี่ยนแปลงจาก Firebase
  onValue(ref(db, `${shopPath}/state`), (snap) => {
    const d = snap.val();
    if (d && d.code && d.code !== window.currentCode) {
      window.currentCode = d.code;
      updateCurrentUI();
      updatePreview();
    }
  });

  // --- UI HANDLERS ---
  window.applyCode = function() {
    const input = document.getElementById('scanInput');
    const code = input.value.trim().toUpperCase();
    if (!code) return;
    
    // ตรวจสอบสินค้าในสต็อก
    if (window.products[code]) {
      window.currentCode = code;
      set(ref(db, `${shopPath}/state`), {
        code: code,
        ts: Date.now()
      });
      updateCurrentUI();
      updatePreview();
      showToast(`✅ เปลี่ยนเป็นรหัส ${code}`);
    } else {
      showToast(`❌ ไม่พบรหัส ${code} ในสต็อก`);
    }
    input.value = '';
  };

  function updateCurrentUI() {
    const p = window.products[window.currentCode];
    if (!p) return;
    document.getElementById('curCode').textContent = p.code;
    document.getElementById('curName').textContent = p.name;
    document.getElementById('curPrice').textContent = `฿${Number(p.price).toLocaleString()}`;
  }

  function updatePreview() {
    const section = document.getElementById('previewSection');
    if (window.currentCode) section.style.display = 'block';
  }

  window.logOut = function() {
    sessionStorage.clear();
    window.location.href = 'login.html';
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  document.getElementById('scanInput').focus();
</script>
</body>
</html>
