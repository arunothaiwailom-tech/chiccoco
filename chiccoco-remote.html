<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>chiccoco — Remote</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&family=Kanit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body { font-family:'Sarabun',sans-serif; background:#f0ede8; min-height:100vh; padding:16px; color:#111; }

.app-title { font-family:'Kanit',sans-serif; font-size:20px; font-weight:800; letter-spacing:4px; text-align:center; margin-bottom:2px; }
.app-sub { text-align:center; font-size:10px; color:#aaa; letter-spacing:2px; margin-bottom:16px; }

/* STATUS */
.status-bar { background:white; border-radius:12px; padding:12px 16px; margin-bottom:12px; display:flex; align-items:center; gap:10px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
.status-dot { width:10px; height:10px; border-radius:50%; background:#ccc; flex-shrink:0; transition:background .3s; }
.status-dot.connected { background:#5c7a6b; }
.status-dot.error { background:#e63946; }
.status-txt { font-size:12px; font-weight:600; color:#555; flex:1; }

/* CURRENT PRODUCT */
.current-card { background:white; border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:0 1px 6px rgba(0,0,0,.06); border-left:4px solid #5c7a6b; }
.current-lbl { font-size:10px; font-weight:700; color:#aaa; letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; font-family:'Kanit',sans-serif; }
.current-code { font-size:32px; font-weight:800; color:#8b1a1a; line-height:1; font-family:'Kanit',sans-serif; }
.current-name { font-size:13px; color:#555; margin-top:4px; }
.current-price { font-size:18px; font-weight:700; color:#2c2c2c; margin-top:4px; font-family:'Kanit',sans-serif; }

/* BARCODE INPUT */
.scan-section { background:white; border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
.scan-lbl { font-size:11px; font-weight:700; color:#aaa; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; font-family:'Kanit',sans-serif; }
.scan-input-wrap { display:flex; gap:8px; }
.scan-input { flex:1; padding:14px 16px; border:2px solid #e0e0e0; border-radius:10px; font-size:20px; font-family:'Kanit',sans-serif; font-weight:700; color:#111; outline:none; text-transform:uppercase; }
.scan-input:focus { border-color:#5c7a6b; }
.btn-scan { padding:14px 20px; background:#5c7a6b; color:white; border:none; border-radius:10px; font-family:'Kanit',sans-serif; font-size:14px; font-weight:700; cursor:pointer; }

/* SIZE PILLS */
.sizes-section { background:white; border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
.sizes-lbl { font-size:11px; font-weight:700; color:#aaa; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; font-family:'Kanit',sans-serif; }
.sizes-pills { display:flex; flex-wrap:wrap; gap:8px; }
.size-pill {
  padding:12px 20px; border-radius:10px; font-family:'Kanit',sans-serif; font-size:18px; font-weight:800;
  cursor:pointer; border:2px solid #e0e0e0; background:#f5f5f5; color:#333; transition:all .15s; user-select:none;
  min-width:70px; text-align:center;
}
.size-pill.sold { background:#fee; border-color:#f5b8b8; color:#c0392b; text-decoration:line-through; }
.sizes-empty { font-size:13px; color:#aaa; }

/* PRICE EDIT */
.price-section { background:white; border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
.price-lbl { font-size:11px; font-weight:700; color:#aaa; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; font-family:'Kanit',sans-serif; }
.price-row { display:flex; gap:8px; align-items:center; }
.price-input { flex:1; padding:12px 14px; border:2px solid #e0e0e0; border-radius:10px; font-size:20px; font-family:'Kanit',sans-serif; font-weight:700; outline:none; }
.price-input:focus { border-color:#c8a96e; }
.btn-price { padding:12px 16px; background:#8b1a1a; color:white; border:none; border-radius:10px; font-family:'Kanit',sans-serif; font-size:13px; font-weight:700; cursor:pointer; }
.btn-price-reset { padding:12px 14px; background:#f5f5f5; color:#888; border:none; border-radius:10px; font-family:'Kanit',sans-serif; font-size:13px; font-weight:700; cursor:pointer; }

/* STOCK LOADER */
.stock-section { background:white; border-radius:14px; padding:16px; margin-bottom:12px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
.stock-lbl { font-size:11px; font-weight:700; color:#aaa; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; font-family:'Kanit',sans-serif; }
.stock-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.btn-load-stock { padding:10px 16px; background:#111; color:white; border:none; border-radius:8px; font-family:'Kanit',sans-serif; font-size:12px; font-weight:700; cursor:pointer; position:relative; overflow:hidden; }
.btn-load-stock input { position:absolute; inset:0; opacity:0; cursor:pointer; }
.stock-info { font-size:12px; color:#888; }

/* FIREBASE CONFIG */
.config-section { background:#fff8e1; border:1.5px solid #f5c842; border-radius:14px; padding:16px; margin-bottom:12px; }
.config-lbl { font-size:11px; font-weight:700; color:#b8860b; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; font-family:'Kanit',sans-serif; }
.config-input { width:100%; padding:8px 12px; border:1.5px solid #e0d0a0; border-radius:8px; font-size:12px; margin-bottom:6px; outline:none; font-family:monospace; background:white; }
.btn-connect { width:100%; padding:10px; background:#f5c842; color:#333; border:none; border-radius:8px; font-family:'Kanit',sans-serif; font-size:13px; font-weight:700; cursor:pointer; margin-top:4px; }

/* TOAST */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#111; color:white; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:600; font-family:'Kanit',sans-serif; opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; white-space:nowrap; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<div class="app-title">chiccoco</div>
<div class="app-sub">REMOTE CONTROL</div>

<!-- STATUS -->
<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span class="status-txt" id="statusTxt">ยังไม่ได้เชื่อมต่อ Firebase</span>
</div>

<!-- FIREBASE CONFIG -->
<div class="config-section" id="configSection">
  <div class="config-lbl">⚙️ ตั้งค่า Firebase (ทำครั้งเดียว)</div>
  <input class="config-input" id="cfg-apiKey" placeholder="apiKey">
  <input class="config-input" id="cfg-projectId" placeholder="projectId">
  <input class="config-input" id="cfg-dbUrl" placeholder="databaseURL (https://xxx.firebaseio.com)">
  <button class="btn-connect" onclick="connectFirebase()">🔌 เชื่อมต่อ Firebase</button>
</div>

<!-- STOCK LOADER -->
<div class="stock-section">
  <div class="stock-lbl">📂 โหลดสต๊อก</div>
  <div class="stock-row">
    <button class="btn-load-stock">
      เลือกไฟล์ Excel
      <input type="file" id="stockFile" accept=".xlsx,.xls" onchange="loadStock(this)">
    </button>
    <select id="fileTypeSelect" style="padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-family:'Sarabun',sans-serif;font-size:12px;outline:none;">
      <option value="custom">Excel ทำเอง</option>
      <option value="vrich">V Rich App</option>
    </select>
    <span class="stock-info" id="stockInfo">ยังไม่มีสต๊อก</span>
  </div>
</div>

<!-- CURRENT PRODUCT -->
<div class="current-card">
  <div class="current-lbl">สินค้าที่แสดงอยู่ตอนนี้</div>
  <div class="current-code" id="curCode">—</div>
  <div class="current-name" id="curName">ยังไม่ได้เลือกสินค้า</div>
  <div class="current-price" id="curPrice"></div>
</div>

<!-- BARCODE SCAN -->
<div class="scan-section">
  <div class="scan-lbl">🔫 สแกนบาร์โค้ด / พิมพ์รหัส</div>
  <div class="scan-input-wrap">
    <input class="scan-input" id="scanInput" placeholder="B129" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')applyCode()">
    <button class="btn-scan" onclick="applyCode()">ยืนยัน</button>
  </div>
</div>

<!-- SIZE PILLS -->
<div class="sizes-section">
  <div class="sizes-lbl">📦 ติ๊กไซส์ที่หมด</div>
  <div class="sizes-pills" id="sizesPills"><span class="sizes-empty">โหลดสินค้าก่อนค่ะ</span></div>
</div>

<!-- PRICE EDIT -->
<div class="price-section">
  <div class="price-lbl">💰 แก้ราคา</div>
  <div class="price-row">
    <input class="price-input" type="number" id="priceInput" placeholder="ราคาใหม่">
    <button class="btn-price" onclick="applyPrice()">ลดราคา</button>
    <button class="btn-price-reset" onclick="resetPrice()">รีเซ็ต</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ── STATE ──
let db = null;
let products = {};       // keyed by code
let currentCode = null;
let soldSizes = [];
let salePrice = null;

// ── FIREBASE CONNECT ──
function connectFirebase() {
  const apiKey    = document.getElementById('cfg-apiKey').value.trim();
  const projectId = document.getElementById('cfg-projectId').value.trim();
  const dbUrl     = document.getElementById('cfg-dbUrl').value.trim();

  if (!apiKey || !projectId || !dbUrl) { showToast('กรุณากรอกข้อมูลให้ครบค่ะ'); return; }

  // save config
  localStorage.setItem('chiccoco_fb', JSON.stringify({ apiKey, projectId, dbUrl }));

  initFirebase(apiKey, projectId, dbUrl);
}

function initFirebase(apiKey, projectId, dbUrl) {
  // dynamically load Firebase
  if (!window.firebase) {
    const s1 = document.createElement('script');
    s1.src = 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js';
      s2.onload = () => doInit(apiKey, projectId, dbUrl);
      document.head.appendChild(s2);
    };
    document.head.appendChild(s1);
  } else {
    doInit(apiKey, projectId, dbUrl);
  }
}

function doInit(apiKey, projectId, dbUrl) {
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp({ apiKey, projectId, databaseURL: dbUrl });
    }
    db = firebase.database();
    setStatus('connected', '✅ เชื่อมต่อ Firebase สำเร็จ');
    document.getElementById('configSection').style.display = 'none';

    // listen for changes from overlay
    db.ref('chiccoco/state').on('value', snap => {
      const d = snap.val();
      if (d) syncFromRemote(d);
    });

    showToast('เชื่อมต่อสำเร็จ!');
  } catch(e) {
    setStatus('error', '❌ เชื่อมต่อไม่สำเร็จ');
    showToast('ตรวจสอบข้อมูล Firebase อีกครั้งค่ะ');
  }
}

function syncFromRemote(d) {
  // just update UI to match current state
  if (d.code && d.code !== currentCode) {
    currentCode = d.code;
    updateCurrentUI();
  }
  if (d.soldSizes) soldSizes = d.soldSizes;
  if (d.salePrice !== undefined) salePrice = d.salePrice;
  renderSizePills();
}

// ── PUSH STATE TO FIREBASE ──
function pushState() {
  if (!db) { showToast('ยังไม่ได้เชื่อมต่อ Firebase'); return; }
  const p = products[currentCode];
  if (!p) return;

  const state = {
    code: currentCode,
    soldSizes: soldSizes,
    salePrice: salePrice,
    ts: Date.now()
  };

  db.ref('chiccoco/state').set(state);
}

// ── BARCODE / CODE INPUT ──
function applyCode() {
  const val = document.getElementById('scanInput').value.trim().toUpperCase();
  if (!val) return;

  if (!products[val]) {
    showToast(`ไม่พบรหัส ${val} ในสต๊อกค่ะ`);
    return;
  }

  currentCode = val;
  soldSizes = [];
  salePrice = null;
  document.getElementById('scanInput').value = '';
  document.getElementById('priceInput').value = '';

  updateCurrentUI();
  renderSizePills();
  pushState();
  showToast(`เปลี่ยนเป็น ${val} แล้วค่ะ`);

  // auto-focus for next scan
  document.getElementById('scanInput').focus();
}

function updateCurrentUI() {
  const p = products[currentCode];
  if (!p) return;
  document.getElementById('curCode').textContent = p.code;
  document.getElementById('curName').textContent = p.name;
  document.getElementById('curPrice').textContent = salePrice
    ? `฿${Number(p.price).toLocaleString()} → ฿${Number(salePrice).toLocaleString()}`
    : `฿${Number(p.price).toLocaleString()}`;
}

// ── SIZE PILLS ──
function renderSizePills() {
  const container = document.getElementById('sizesPills');
  const p = products[currentCode];

  if (!p || p.type === 'misc' || !p.sizes || p.sizes.length === 0) {
    container.innerHTML = '<span class="sizes-empty">ไม่มีข้อมูลไซส์</span>';
    return;
  }

  container.innerHTML = '';
  p.sizes.forEach(s => {
    const pill = document.createElement('div');
    pill.className = 'size-pill' + (soldSizes.includes(s.size) ? ' sold' : '');
    pill.textContent = s.size;
    pill.onclick = () => {
      if (soldSizes.includes(s.size)) {
        soldSizes = soldSizes.filter(x => x !== s.size);
      } else {
        soldSizes.push(s.size);
      }
      renderSizePills();
      pushState();
      showToast(soldSizes.includes(s.size) ? `${s.size} — หมดแล้ว` : `${s.size} — กลับมาแล้ว`);
    };
    container.appendChild(pill);
  });
}

// ── PRICE ──
function applyPrice() {
  const val = document.getElementById('priceInput').value.trim();
  if (!val || !currentCode) return;
  salePrice = val;
  updateCurrentUI();
  pushState();
  showToast(`ลดราคาเป็น ฿${Number(val).toLocaleString()} แล้วค่ะ`);
}

function resetPrice() {
  salePrice = null;
  document.getElementById('priceInput').value = '';
  updateCurrentUI();
  pushState();
  showToast('รีเซ็ตราคาแล้วค่ะ');
}

// ── LOAD STOCK ──
function loadStock(input) {
  const file = input.files[0];
  if (!file) return;
  const fileType = document.getElementById('fileTypeSelect').value;

  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type:'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
    if (rows.length < 2) return;

    const parsed = fileType === 'vrich' ? parseVRich(rows) : parseCustom(rows);
    products = {};
    parsed.forEach(p => { products[p.code] = p; });

    document.getElementById('stockInfo').textContent = `โหลดแล้ว ${parsed.length} รายการ`;
    showToast(`โหลดสต๊อก ${parsed.length} รายการสำเร็จค่ะ`);

    // push products to Firebase so overlay can read
    if (db) db.ref('chiccoco/products').set(products);
  };
  reader.readAsArrayBuffer(file);
}

// ── PARSERS ──
function parseCustom(rows) {
  const hdr = rows[0].map(x => String(x||'').trim());
  const map = {}, order = [];
  const mCols = ['อก','ยาว','วงแขน','บ่า','เอว','สะโพก','เป้า','คัฟอก'];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i]; if (!row||!row[0]) continue;
    const o = {}; hdr.forEach((h,idx) => o[h] = String(row[idx]!=null?row[idx]:'').trim());
    const code = o['รหัส']; if (!code) continue;
    if (!map[code]) { map[code]={type:'clothing',code,name:o['รายละเอียด']||'',price:o['ราคา']||'',color:o['สี']||'',material:o['เนื้อผ้า']||'',sizes:[]}; order.push(code); }
    const sr={size:o['ไซส์']||''};
    mCols.forEach(col=>{if(hdr.includes(col)){const v=o[col];if(v&&v!=='-'&&v!=='0')sr[col]=v;}});
    if(sr.size) map[code].sizes.push(sr);
  }
  return order.map(c=>{const p=map[c];p.activeCols=mCols.filter(f=>p.sizes.some(s=>s[f]));return p;});
}

function parseVRich(rows) {
  const hdr = rows[0].map(x => String(x||'').trim());
  const map = {}, order = [];
  const mPat = {
    'อก':/(?:อกยืด|อก)\s*([\d.]+(?:-[\d.]+)?)/,
    'ยาว':/ยาว\s*([\d.]+(?:-[\d.]+)?)/,
    'วงแขน':/วงแขน\s*([\d.]+(?:-[\d.]+)?)/,
    'บ่า':/บ่า\s*([\d.]+(?:-[\d.]+)?)/,
    'เอว':/(?:เอวยืด|เอว)\s*([\d.]+(?:-[\d.]+)?|[Ff]ree|ฟรี)/,
    'สะโพก':/(?:สะโพกยืด|สะโพก)\s*([\d.]+(?:-[\d.]+)?|[Ff]ree|ฟรี)/,
    'เป้า':/เป้า\s*([\d.]+(?:-[\d.]+)?|[Ff]ree|ฟรี)/,
    'คัฟอก':/คัฟอก\s*([\d.]+(?:-[\d.]+)?|[Ff]ree|ฟรี)/,
  };
  const SIZE_ORDER=['xxs','xs','s','m','l','xl','xxl','2xl'];
  const sizeRank=sz=>{const s=sz.toLowerCase().replace(/\s+/g,'');const i=SIZE_ORDER.indexOf(s);if(i!==-1)return i;const n=parseFloat(s.replace(/[^\d.]/g,''));return isNaN(n)?999:100+n;};

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i]; if(!row||!row[0]) continue;
    const o={}; hdr.forEach((h,idx)=>o[h]=String(row[idx]!=null?row[idx]:'').trim());
    const sellCode=o['รหัสขาย']||''; if(!sellCode) continue;
    const note=o['หมายเหตุ']||''; const size=o['ไซส์']||''; const color=o['สี']||'';
    const price=o['ราคา']||''; const fullPrice=o['ราคาเต็ม']||'';
    const hasMeasure=Object.values(mPat).some(r=>r.test(note));

    let name = o['รายละเอียด']||'';
    const noteMatch = note.match(/^([^*]+?)(?:\s*\*|=)/);
    if(noteMatch) name = noteMatch[1].trim();
    if(!name) name = o['รายละเอียด']||sellCode;

    if(!map[sellCode]){
      map[sellCode]={type:hasMeasure?'clothing':'misc',code:sellCode,name,price:fullPrice||price,color,material:'',sizes:[],size:''};
      if(price&&fullPrice&&Number(price)<Number(fullPrice)){map[sellCode].salePrice=price;}
      order.push(sellCode);
    }
    const p=map[sellCode];
    if(hasMeasure&&size){
      const sr={size};
      Object.entries(mPat).forEach(([col,re])=>{const m=note.match(re);if(m&&m[1])sr[col]=m[1];});
      if(!p.sizes.find(s=>s.size===size)) p.sizes.push(sr);
    } else if(!hasMeasure&&size&&size!=='-'){
      p.size=size;
    }
  }
  return order.map(c=>{
    const p=map[c];
    if(p.type==='clothing'){
      p.sizes=[...p.sizes].sort((a,b)=>sizeRank(a.size)-sizeRank(b.size));
      const nl=p.name.toLowerCase();
      const isPants=/กางเกง|กระโปรง|วอร์ม|เล็กกิ้ง|legging|ยีนส์|jeans/.test(nl);
      const isDress=/เดรส|dress/.test(nl);
      p.activeCols=isPants?['เอว','สะโพก','เป้า','ยาว']:isDress?['อก','เอว','สะโพก','ยาว']:['คัฟอก','อก','ยาว','วงแขน','บ่า'];
      p.activeCols=p.activeCols.filter(f=>p.sizes.some(s=>s[f]));
    }
    return p;
  });
}

// ── UI HELPERS ──
function setStatus(type, msg) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusTxt');
  dot.className = 'status-dot ' + type;
  txt.textContent = msg;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── AUTO FOCUS SCAN INPUT ──
document.addEventListener('DOMContentLoaded', () => {
  // restore Firebase config
  try {
    const cfg = JSON.parse(localStorage.getItem('chiccoco_fb'));
    if (cfg) {
      document.getElementById('cfg-apiKey').value = cfg.apiKey;
      document.getElementById('cfg-projectId').value = cfg.projectId;
      document.getElementById('cfg-dbUrl').value = cfg.dbUrl;
      initFirebase(cfg.apiKey, cfg.projectId, cfg.dbUrl);
    }
  } catch(e) {}

  document.getElementById('scanInput').focus();
});
</script>
</body>
</html>
